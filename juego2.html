<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Siguiente nivel</title>

    <link rel="icon" href="img/logo1.png" type="image/png">
    <link rel="stylesheet" href="css/estilo_juego2.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600&display=swap" rel="stylesheet">    

</head>

<body>

<div class="contenedor">

        <div class="barra-superior">
            <div class="lado-izquierdo">
                <img id="avatar">
                <h1 id="nombre"></h1>
            </div>

            <div class="titulo">
                ¡Aprenderemos a contar del 1 al 5!
            </div>
        </div>

        <div class="juego">
            <div class="numeros" id="numeros">
                <div class="item">1</div>
                <div class="item">2</div>
                <div class="item">3</div>
                <div class="item">4</div>
                <div class="item">5</div>
            </div>

            <div class="casillas">
                <div class="dropzone" data-num="1"></div>
                <div class="dropzone" data-num="2"></div>
                <div class="dropzone" data-num="3"></div>
                <div class="dropzone" data-num="4"></div>
                <div class="dropzone" data-num="5"></div>
            </div>
        </div>

        <button onclick="verificar()">Verificar</button>

    </div>

    <!-- 🔊 AUDIO -->
    <audio id="okSound" src="sonidos/ok.mp3"></audio>


    <script>
        // ===== RECIBIR DATOS =====
        let nombre = localStorage.getItem("nombre");
        let avatar = localStorage.getItem("avatar");

        document.getElementById("nombre").innerText = "Bienvenido " + nombre.toUpperCase();
        document.getElementById("avatar").src = avatar;

        // ===== BOTÓN VOLVER =====
        function volver() {
            window.location.href = "juego2.html"; // o tu página del juego
        }
    </script>

    <script src="js/juego2.js"></script>

</body>
</html>
